name: tune-resnet
description: Tune a ResNet classifier on CIFAR-10
primary_metric: val_accuracy
goal: maximize
dataset: cifar10
max_experiments: 25
max_concurrency: 4
target_metric_value: 0.93
search_space:
  - name: learning_rate
    type: float
    low: 0.0001
    high: 0.1
    log_scale: true
  - name: batch_size
    type: int
    low: 32
    high: 256
  - name: optimizer
    type: categorical
    choices: [adam, sgd, adamw]
  - name: use_augmentation
    type: bool
    choices: [true, false]
